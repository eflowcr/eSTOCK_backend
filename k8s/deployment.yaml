apiVersion: apps/v1
kind: Deployment
metadata:
  name: estock-backend
  namespace: estock-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: estock-backend
  template:
    metadata:
      labels:
        app: estock-backend
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: backend
          image: 31.97.145.251:5000/estock-backend:dev-latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: estock-backend-env
          env:
            - name: ENVIRONMENT
              value: development
            - name: MIGRATION_URL
              value: file://db/migrations
            - name: SERVER_ADDRESS
              value: ":8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: estock-backend
  namespace: estock-dev
spec:
  selector:
    app: estock-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
