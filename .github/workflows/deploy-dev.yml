name: Build & Push Backend (Dev)

on:
  push:
    branches: [development, develop, dev, jafet-dev]
  workflow_dispatch:

env:
  IMAGE_NAME: estock-backend

jobs:
  test:
    name: Unit Tests — Articles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run article unit tests
        run: |
          go test ./services/... ./repositories/... \
            -run "TestArticles|TestParseBool|TestUnique|TestBuildImport|TestGetLang|TestLotsService" \
            -count=1 -v 2>&1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch CI secrets from VPS Manager
        run: |
          echo "Fetching CI secrets from VPS Manager (env: ci)..."
          SECRETS=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.VPS_SECRET_TOKEN }}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/service/secrets?env=ci&format=env")

          echo "$SECRETS" >> $GITHUB_ENV

          # Fetch runtime backend secrets (env: dev)
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.VPS_SECRET_TOKEN }}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/service/secrets?env=dev&format=env" \
            >> $GITHUB_ENV

          echo "✅ Secrets loaded"

      - name: Configure Docker for insecure registry
        run: |
          sudo mkdir -p /etc/docker
          echo "{\"insecure-registries\": [\"${REGISTRY_HOST}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY_HOST }}"]
              http = false
              insecure = true

      - name: Login to VPS Registry
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login \
            --username "${REGISTRY_USER}" \
            --password-stdin \
            "${REGISTRY_HOST}"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: estock-backend

      - name: Notify VPS Manager — update all client stacks
        run: |
          echo "Triggering update-all for client stacks..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.VPS_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\":\"dev-${{ github.sha }}\"}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/stacks/update" \
            && echo "✅ Client stacks update triggered" \
            || echo "⚠️  No active client stacks (or update skipped)"

      - name: Verify
        run: |
          echo "✅ ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:dev-latest pushed"
          echo "Branch: ${{ github.ref_name }} | SHA: ${{ github.sha }}"
