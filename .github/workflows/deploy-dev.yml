name: Build & Push Backend (Dev)

on:
  push:
    branches: [development, develop, dev, jafet-dev]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_HOST }}
  IMAGE_NAME: estock-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker for insecure registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_HOST }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ secrets.REGISTRY_HOST }}"]
              http = false
              insecure = true

      - name: Login to VPS Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
            --username "${{ secrets.REGISTRY_USER }}" \
            --password-stdin \
            "${{ secrets.REGISTRY_HOST }}"

      - name: Fetch runtime secrets from VPS Manager
        run: |
          echo "Fetching eSTOCK secrets from VPS Manager..."
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.VPS_SECRET_TOKEN }}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/service/secrets?env=production&format=env" \
            >> $GITHUB_ENV
          echo "✅ Secrets loaded into environment"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Verify
        run: |
          echo "✅ ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest pushed"
          echo "Branch: ${{ github.ref_name }} | SHA: ${{ github.sha }}"
