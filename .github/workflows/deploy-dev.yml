name: Build & Push Backend (Dev)

on:
  push:
    branches: [development, develop, dev, jafet-dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: eflowcr/estock-backend

jobs:
  test:
    name: Unit Tests — Articles, Locations & Inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: |
          go test ./services/... ./repositories/... \
            -run "TestArticles|TestParseBool|TestUnique|TestBuildImport|TestGetLang|TestLotsService|TestLocations|TestIfStr|TestInventory" \
            -count=1 -v 2>&1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify VPS Manager — update all client stacks
        run: |
          echo "Triggering update-all for client stacks..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.VPS_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\":\"${{ github.sha }}\"}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/stacks/update" \
            && echo "✅ Client stacks update triggered" \
            || echo "⚠️  No active client stacks (or update skipped)"

      - name: Verify
        run: |
          echo "✅ ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest pushed"
          echo "Branch: ${{ github.ref_name }} | SHA: ${{ github.sha }}"
