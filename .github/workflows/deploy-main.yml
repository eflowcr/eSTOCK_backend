name: Build & Deploy Backend (Main)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: eflowcr/estock-backend

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: go test ./... -short -count=1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=estock-backend
            org.opencontainers.image.vendor=eflowcr
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Notify VPS Manager — update all client stacks
        env:
          SHA: ${{ github.sha }}
          VPS_SECRET_TOKEN: ${{ secrets.VPS_SECRET_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${VPS_SECRET_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\":\"production-${SHA}\",\"environment\":\"production\"}" \
            "https://vps-manager-api.31.97.145.251.nip.io/api/v1/stacks/update" \
            && echo "Production backend deploy triggered" \
            || echo "No active client stacks (or update skipped)"
      - name: Verify
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          echo "ghcr.io/eflowcr/estock-backend:production pushed"
          echo "ghcr.io/eflowcr/estock-backend:production-${SHA} pushed"
          echo "Branch: ${REF} | SHA: ${SHA}"
